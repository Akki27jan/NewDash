version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: studentdash_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-student_dash}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - studentdash_network

  backend:
    build:
      context: ./backend_api
      dockerfile: Dockerfile
    container_name: studentdash_backend
    restart: always
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://postgres:password@db:5432/student_dash}
      - JWT_SECRET=${JWT_SECRET:-super_secret_homelab_key_change_me}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-43200}
      - SMTP_SERVER=${SMTP_SERVER}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - EMAIL_FROM=${EMAIL_FROM}
    ports:
      - "8000:8000"
    depends_on:
      - db
    networks:
      - studentdash_network

  frontend:
    build:
      context: ./frontend_ui
      dockerfile: Dockerfile
    container_name: studentdash_frontend
    restart: always
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - studentdash_network

networks:
  studentdash_network:
    driver: bridge

volumes:
  postgres_data:
